<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finance Tracker</title>
<!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"> -->
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}

body{
background:radial-gradient(circle at 10% 10%,#1e293b,#020617);
color:#e2e8f0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.dashboard{
width:1500px;
height:900px;
background:#0f172a;
border-radius:28px;
display:grid;
grid-template-columns:240px 1fr;
overflow:hidden;
box-shadow:0 40px 120px rgba(0,0,0,.7);
}

/* SIDEBAR */
.sidebar{
background:#020617;
padding:30px 20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:30px;
}

.nav{
display:flex;
flex-direction:column;
gap:14px;
}

.nav button{
background:#0f172a;
border:none;
color:#cbd5f5;
padding:12px;
border-radius:10px;
cursor:pointer;
text-align:left;
}

.nav button:hover{background:#1e293b}

.user{
font-size:14px;
color:#94a3b8;
}

/* MAIN */
.main{
padding:30px 40px;
display:flex;
flex-direction:column;
gap:24px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:22px;
}

.actions{
display:flex;
gap:12px;
}

.btn{
border:none;
padding:10px 16px;
border-radius:10px;
font-size:14px;
cursor:pointer;
color:white;
}

.income{background:linear-gradient(135deg,#22c55e,#4ade80)}
.expense{background:linear-gradient(135deg,#ef4444,#fb7185)}

/* STATS */
.cards{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:16px;
}

.card-title{
font-size:13px;
color:#94a3b8;
margin-bottom:8px;
}

.card-value{
font-size:26px;
font-weight:600;
}

/* CONTENT */
.content{
display:grid;
grid-template-columns:340px 1fr;
gap:24px;
flex:1;
}

/* CHART */
.chart{
background:#1e293b;
border-radius:18px;
padding:24px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.chart-circle{
width:200px;
height:200px;
border-radius:50%;
background:conic-gradient(
#22c55e 0% 35%,
#6366f1 35% 65%,
#fb7185 65% 90%,
#facc15 90% 100%
);
display:flex;
align-items:center;
justify-content:center;
}

.chart-inner{
width:140px;
height:140px;
background:#0f172a;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.chart-inner span{
font-size:24px;
font-weight:600;
}

/* TRANSACTIONS */
.transactions{
background:#1e293b;
border-radius:18px;
padding:20px;
display:flex;
flex-direction:column;
}

.transactions h3{
margin-bottom:16px;
}

.transaction-list{
display:flex;
flex-direction:column;
gap:10px;
overflow:auto;
}

.transaction{
background:#0f172a;
padding:12px 14px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.transaction-info{
display:flex;
flex-direction:column;
}

.transaction-name{
font-size:14px;
}

.transaction-date{
font-size:12px;
color:#64748b;
}

.amount{
font-weight:600;
}

.plus{color:#4ade80}
.minus{color:#fb7185}


/* Модальное окно для добавления транзакции */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1000;
}

.modal.hidden {
  display: none;
}

.modal-content {
  background: #0f172a;
  padding: 24px;
  border-radius: 18px;
  width: 360px;
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
}

.modal-content h2 {
  margin-bottom: 16px;
  font-size: 18px;
}

.modal-content label {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
  font-size: 14px;
  color: #cbd5f5;
}

.modal-content input {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #0f172a;
  color: #e2e8f0;
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.modal-actions button {
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
}

.modal-actions .confirm {
  background: #22c55e;
  color: #07180a;
}

.modal-actions .cancel {
  background: #334155;
  color: #f1f5f9;
}
</style>
</head>
<body>
<script>
  // Страница защита: без api-ключа отсылаем на /auth
  const apiKey = localStorage.getItem('api_hash');
  if (!apiKey) {
    window.location.href = '/auth';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const username = localStorage.getItem('username') || 'User';
    const logo = document.querySelector('.logo');
    if (logo) logo.textContent = username;

    loadDashboard();
  });

  function logout() {
    localStorage.removeItem('api_hash');
    localStorage.removeItem('username');
    window.location.href = '/auth';
  }

  function formatMoney(value) {
    return '$' + Number(value).toLocaleString('en-US');
  }

  async function postJson(url, data) {
    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(data),
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(text || `${response.status} ${response.statusText}`);
    }

    return response.json().catch(() => null);
  }

  async function fetchBalance() {
    const result = await postJson('/getBalance', { api_hash: apiKey });
    return Number(result?.balance || 0);
  }

  async function fetchIncomes() {
    const result = await postJson('/checkIncome', { api_hash: apiKey });
    return Array.isArray(result?.incomes) ? result.incomes : [];
  }

  async function fetchExpenses() {
    const result = await postJson('/checkExpens', { api_hash: apiKey });
    return Array.isArray(result?.expenses) ? result.expenses : [];
  }

  async function loadDashboard() {
    try {
      const [balance, incomes, expenses] = await Promise.all([
        fetchBalance(),
        fetchIncomes(),
        fetchExpenses(),
      ]);

      updateDashboard(balance, incomes, expenses);
    } catch (err) {
      console.error('Не удалось загрузить данные', err);
      alert('Не удалось загрузить данные. Попробуйте перезагрузить страницу.');
    }
  }

  function updateDashboard(balance, incomes, expenses) {
    const incomeTotal = incomes.reduce((s, item) => s + Number(item.amount || 0), 0);
    const expenseTotal = expenses.reduce((s, item) => s + Number(item.amount || 0), 0);

    const balanceEl = document.getElementById('balance');
    const incomeEl = document.getElementById('income');
    const expenseEl = document.getElementById('expense');
    const chartTotal = document.getElementById('chartTotal');

    if (balanceEl) balanceEl.textContent = formatMoney(balance);
    if (incomeEl) incomeEl.textContent = formatMoney(incomeTotal);
    if (expenseEl) expenseEl.textContent = formatMoney(expenseTotal);
    if (chartTotal) chartTotal.textContent = formatMoney(balance);

    renderTransactions(incomes, expenses);
  }

  function renderTransactions(incomes, expenses) {
    const list = document.getElementById('transactions');
    if (!list) return;

    list.innerHTML = '';

    const items = [
      ...incomes.map(item => ({ ...item, type: 'income' })),
      ...expenses.map(item => ({ ...item, type: 'expense' })),
    ];

    items.reverse();

    // Показываем только 10 последних транзакций
    const recent = items.slice(0, 10);

    recent.forEach(item => {
      const row = document.createElement('div');
      row.className = 'transaction';

      const info = document.createElement('div');
      info.className = 'transaction-info';

      const name = document.createElement('div');
      name.className = 'transaction-name';
      name.textContent = item.description || (item.type === 'income' ? 'Доход' : 'Расход');

      const date = document.createElement('div');
      date.className = 'transaction-date';
      date.textContent = new Date().toLocaleString();

      info.appendChild(name);
      info.appendChild(date);

      const amountEl = document.createElement('div');
      amountEl.className = 'amount ' + (item.type === 'income' ? 'plus' : 'minus');
      const prefix = item.type === 'income' ? '+' : '-';
      amountEl.textContent = prefix + formatMoney(item.amount || 0);

      row.appendChild(info);
      row.appendChild(amountEl);

      list.appendChild(row);
    });
  }

  async function addTransaction(type) {
    const modal = document.getElementById('transactionModal');
    const title = document.getElementById('modalTitle');
    const submit = document.getElementById('modalSubmit');
    const amount = document.getElementById('modalAmount');
    const description = document.getElementById('modalDesc');

    title.textContent = type === 'income' ? 'Добавить доход' : 'Добавить расход';
    amount.value = '';
    description.value = '';

    submit.onclick = async () => {
      const value = Number(amount.value);
      const desc = description.value.trim();

      if (!value || value <= 0) {
        alert('Введите корректную сумму');
        return;
      }

      try {
        await postJson(type === 'income' ? '/addIncome' : '/addExpens', {
          api_hash: apiKey,
          amount: value,
          description: desc,
        });

        closeModal();
        loadDashboard();
      } catch (err) {
        console.error('Не удалось сохранить транзакцию', err);
        alert('Не удалось сохранить транзакцию');
      }
    };

    modal.classList.remove('hidden');
  }

  function closeModal() {
    const modal = document.getElementById('transactionModal');
    modal.classList.add('hidden');
  }
</script>


<div id="transactionModal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle">Добавить транзакцию</h2>

    <label>
      Сумма
      <input id="modalAmount" type="number" min="0" placeholder="0" />
    </label>

    <label>
      Описание
      <input id="modalDesc" type="text" placeholder="Например: зарплата, еда" />
    </label>

    <div class="modal-actions">
      <button class="cancel" type="button" onclick="closeModal()">Отмена</button>
      <button class="confirm" type="button" id="modalSubmit">Сохранить</button>
    </div>
  </div>
</div>

<div class="dashboard">

<div class="sidebar">
<div>
<div class="logo">{{ .Username }}</div>
<div class="nav">
<button>Dashboard</button>
<button>Transactions</button>
<button>Analytics</button>
<button>Settings</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<!-- <div class="user">@username</div> -->
</div>

<div class="main">

<header>
<h1>Finance Tracker</h1>
<div class="actions">
<button class="btn income" onclick="addTransaction('income')">+ Income</button>
<button class="btn expense" onclick="addTransaction('expense')">- Expense</button>
</div>
</header>

<div class="cards">
<div class="card">
<div class="card-title">Total Balance</div>
<div class="card-value" id="balance">$0</div>
</div>

<div class="card">
<div class="card-title">Income</div>
<div class="card-value" id="income">$0</div>
</div>

<div class="card">
<div class="card-title">Expense</div>
<div class="card-value" id="expense">$0</div>
</div>
</div>

<div class="content">

<div class="chart">
<div class="chart-circle">
<div class="chart-inner">
Total
<span id="chartTotal">$0</span>
</div>
</div>
</div>

<div class="transactions">
<h3>Recent Transactions</h3>
<div class="transaction-list" id="transactions"></div>
</body>
</html>
